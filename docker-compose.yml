services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_aprangos_asistentas
      POSTGRES_USER: ai_aprangos_asistentas
      POSTGRES_PASSWORD: change_me
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_aprangos_asistentas -d ai_aprangos_asistentas"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    command:
      [
        "sh",
        "-c",
        "/infra/wait-for-db.sh python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
      ]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    command:
      [
        "sh",
        "-c",
        "/infra/wait-for-db.sh python manage.py migrate && python manage.py run_worker"
      ]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - frontend_node_modules:/frontend/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

volumes:
  postgres_data:
  backend_media:
  frontend_node_modules:
