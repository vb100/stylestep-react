services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    command:
      [
        "sh",
        "-c",
        "/infra/wait-for-db.sh python manage.py migrate && python manage.py collectstatic --noinput && gunicorn ai_aprangos_asistentas.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 180"
      ]

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    command:
      [
        "sh",
        "-c",
        "/infra/wait-for-db.sh python manage.py migrate && python manage.py run_worker"
      ]

  web:
    build:
      context: .
      dockerfile: deploy/caddy/Dockerfile
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - backend_media:/srv/media:ro
      - backend_static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  backend_media:
  backend_static:
  caddy_data:
  caddy_config:
